<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hidrauldiesel — Folha de Pagamento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="hd-folha.css">
<script src="../shared/hd-api.js"></script>
<script src="../shared/hd-auth.js"></script>
  <link rel="stylesheet" href="../shared/hd-nav.css">
</head>
<body>
<aside>
  <div class="logo-wrap">
    <img src="../imagens/Design sem nome (6).png" alt="" class="logo-img">
  </div>
  <div class="logo-divider"></div>
  <nav>
    <a href="../dashboard/">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="../lista-os/">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Ordens de serviço
    </a>

    <div class="nav-group" id="nav-group-cad">
      <div class="nav-group-toggle" onclick="toggleNavGroup('nav-group-cad')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/><path d="M3 7l9 6 9-6"/></svg>
        Cadastros
        <span class="nav-arrow" id="arrow-nav-group-cad">&#9656;</span>
      </div>
      <div class="nav-submenu" id="sub-nav-group-cad">
        <a href="../clientes/" class="nav-submenu-item">Clientes</a>
        <a href="../estoque/" class="nav-submenu-item">Estoque</a>
        <a href="../servicos/" class="nav-submenu-item">Serviços</a>
      </div>
    </div>

    <div class="nav-group" id="nav-group-func">
      <div class="nav-group-toggle" onclick="toggleNavGroup('nav-group-func')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Funcionários
        <span class="nav-arrow" id="arrow-nav-group-func">&#9656;</span>
      </div>
      <div class="nav-submenu" id="sub-nav-group-func">
        <a href="../funcionarios/" class="nav-submenu-item">Funcionários</a>

        <a href="../folha/" class="nav-submenu-item">Folha de Pagamento</a>
        <a href="../vale-transporte/" class="nav-submenu-item">Vale Transporte</a>
        <a href="../comissionamento/" class="nav-submenu-item">Comissionamento</a>
        <a href="../ponto/" class="nav-submenu-item">Ponto</a>
      </div>
    </div>
    <a href="../historico/">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Histórico
    </a>
  </nav>
  <div class="sidebar-bottom"><strong>Hidrauldiesel</strong>Sistema de Gestão</div>
</aside>

<main>
  <header>
    <span class="page-title">Folha de Pagamento</span>
    <div class="header-actions">
      <input type="month" id="input-mes" class="input-mes"/>
      <button class="btn btn-ghost" id="btn-dia05">Gerar Folha Dia 05</button>
      <button class="btn btn-primary" id="btn-dia20">Gerar Folha Dia 20</button>
    </div>
  </header>

  <div class="content">

    <!-- Histórico -->
    <div class="historico-section">
      <div class="section-titulo">Folhas anteriores</div>
      <div id="historico-lista" class="historico-lista">
        <div style="color:var(--muted);font-size:13px;padding:16px">Carregando…</div>
      </div>
    </div>
  </div>
</main>

<!-- Modal de confirmação -->
<div id="modal-confirmar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:28px 32px;max-width:400px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18)">
    <div id="modal-confirmar-msg" style="font-size:14px;color:#1a1a1a;margin-bottom:22px;line-height:1.5"></div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button id="modal-confirmar-nao" style="font-family:inherit;font-size:13px;padding:7px 18px;border-radius:7px;border:1px solid #E3E1DA;background:#fff;color:#444;cursor:pointer">Cancelar</button>
      <button id="modal-confirmar-sim" style="font-family:inherit;font-size:13px;padding:7px 18px;border-radius:7px;border:none;background:#DC2626;color:#fff;cursor:pointer;font-weight:500">Excluir</button>
    </div>
  </div>
</div>

<!-- Toast de erro -->
<div id="toast-erro" style="display:none;position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#DC2626;color:#fff;font-size:13px;padding:11px 22px;border-radius:8px;z-index:9100;box-shadow:0 4px 16px rgba(0,0,0,.18);max-width:420px;text-align:center"></div>

<script src="hd-folha.js"></script>
  <script>
  (function() {
    var path = window.location.pathname;
    // Cadastros submenu
    var cadPages = ['clientes','estoque','servicos'];
    if (cadPages.some(function(p){ return path.indexOf('/'+p+'/') !== -1; })) {
      var sub = document.getElementById('sub-nav-group-cad');
      var grp = document.getElementById('nav-group-cad');
      var arr = document.getElementById('arrow-nav-group-cad');
      if (sub) sub.classList.add('open');
      if (grp) grp.classList.add('has-active');
      if (arr) arr.innerHTML = '&#9662;';
      document.querySelectorAll('#sub-nav-group-cad .nav-submenu-item').forEach(function(a){
        var seg = a.getAttribute('href').replace('../','').replace('/','');
        if (path.indexOf('/'+seg+'/') !== -1) a.classList.add('active');
      });
    }
    // Funcionários submenu
    var funcPages = ['funcionarios','folha','vale-transporte','comissionamento','ponto'];
    if (funcPages.some(function(p){ return path.indexOf('/'+p+'/') !== -1; })) {
      var sub = document.getElementById('sub-nav-group-func');
      var grp = document.getElementById('nav-group-func');
      var arr = document.querySelector('#nav-group-func .nav-arrow');
      if (sub) sub.classList.add('open');
      if (grp) grp.classList.add('has-active');
      if (arr) arr.innerHTML = '&#9662;';
      document.querySelectorAll('#sub-nav-group-func .nav-submenu-item').forEach(function(a){
        var seg = a.getAttribute('href').replace('../','').replace('/','');
        if (path.indexOf('/'+seg+'/') !== -1) a.classList.add('active');
      });
    }
  })();
  function toggleNavGroup(id) {
    var sub = document.getElementById('sub-'+id);
    var arr = document.getElementById('arrow-'+id);
    if (!sub) return;
    sub.classList.toggle('open');
    if (arr) arr.innerHTML = sub.classList.contains('open') ? '&#9662;' : '&#9656;';
  }
  </script>
</body>
</html>
