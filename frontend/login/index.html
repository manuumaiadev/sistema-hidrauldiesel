<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hidrauldiesel — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="hd-login.css">
</head>
<body>

<div class="login-left">
  <div class="login-brand">
    <img src="../imagens/Design sem nome (6).png" alt="Hidrauldiesel" class="login-logo">
    <p class="login-tagline">Sistema de Gestão</p>
  </div>
  <div class="login-left-footer">© 2026 Hidrauldiesel</div>
</div>

<div class="login-right">
  <div class="login-card">
    <div class="login-card-header">
      <h1>Entrar</h1>
      <p>Acesse sua conta para continuar</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="Digite seu usuário" autocomplete="username" autofocus/>
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="Digite sua senha" autocomplete="current-password"/>
          <button type="button" class="toggle-password" id="togglePassword" tabindex="-1">
            <svg id="eyeIcon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="login-error" id="loginError"></div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnText">Entrar</span>
        <span id="btnLoader" class="btn-loader" style="display:none"></span>
      </button>
    </form>
  </div>
</div>

<script src="hd-login.js"></script>
</body>
</html>
